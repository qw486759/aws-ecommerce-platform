services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: ecommerce
      MYSQL_USER: admin
      MYSQL_PASSWORD: password
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "admin", "-ppassword"]
      interval: 5s
      timeout: 5s
      retries: 10

  dynamodb-local:
    image: amazon/dynamodb-local:latest
    ports:
      - "8001:8000"
    command: "-jar DynamoDBLocal.jar -sharedDb -inMemory"

  dynamodb-init:
    image: amazon/aws-cli:latest
    depends_on:
      - dynamodb-local
    environment:
      AWS_ACCESS_KEY_ID: local
      AWS_SECRET_ACCESS_KEY: local
      AWS_DEFAULT_REGION: us-east-1
    entrypoint: >
      /bin/sh -c "
      until aws dynamodb list-tables --endpoint-url http://dynamodb-local:8000 > /dev/null 2>&1;
      do echo 'waiting for dynamodb-local...'; sleep 2; done;
      aws dynamodb create-table
      --table-name ecommerce-orders
      --attribute-definitions AttributeName=order_id,AttributeType=S AttributeName=user_id,AttributeType=S
      --key-schema AttributeName=order_id,KeyType=HASH
      --billing-mode PAY_PER_REQUEST
      --global-secondary-indexes '[{\"IndexName\":\"user-index\",\"KeySchema\":[{\"AttributeName\":\"user_id\",\"KeyType\":\"HASH\"}],\"Projection\":{\"ProjectionType\":\"ALL\"}}]'
      --endpoint-url http://dynamodb-local:8000"

  app:
    image: ecommerce-app:local
    ports:
      - "8000:8000"
    environment:
      ENVIRONMENT: staging
      DB_HOST: mysql
      DB_USER: admin
      DB_PASSWORD: password
      DB_NAME: ecommerce
      AWS_REGION: us-east-1
      AWS_ACCESS_KEY_ID: local
      AWS_SECRET_ACCESS_KEY: local
      DYNAMODB_TABLE: ecommerce-orders
      AWS_ENDPOINT_URL: http://dynamodb-local:8000
    depends_on:
      mysql:
        condition: service_healthy
      dynamodb-init:
        condition: service_completed_successfully